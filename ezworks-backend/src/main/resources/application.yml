spring:
  application:
    name: ezworks-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: America/Bogota
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

ezworks:
  jwt:
    secret: ${JWT_SECRET:ezworks-dev-secret-change-in-production-min-32-chars!!}
    access-expiration-ms: ${JWT_ACCESS_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}
  terminos:
    version: "2026-05-22"
