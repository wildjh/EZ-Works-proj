<div class="relative min-h-screen bg-gray-50 dark:bg-gray-900 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8">

  <div class="absolute top-6 left-6 sm:top-8 sm:left-8">
    <a routerLink="/inicio">
      <img src="/logo-claro.png" alt="Logo EZWorks" class="h-6 w-auto object-contain">
    </a>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-xl text-center mb-8">
    <h1 class="text-3xl font-extrabold text-upwork-dark dark:text-white tracking-tight">
      Crear cuenta
    </h1>
    <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
      Únete a EZWorks
    </p>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-xl">
    <div class="bg-white dark:bg-gray-800 py-8 px-6 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm sm:px-10">

      @if (error()) {
        <div class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800
                    rounded-xl text-sm font-medium text-red-600 dark:text-red-400 flex items-center gap-2">
          <svg class="w-5 h-5 text-red-500 dark:text-red-400 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
          </svg>
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nombre</label>
            <input type="text" formControlName="nombre"
                   class="appearance-none block w-full px-3 py-2.5
                          bg-white dark:bg-gray-700
                          border border-gray-300 dark:border-gray-600
                          text-gray-900 dark:text-white
                          placeholder-gray-400 dark:placeholder-gray-500
                          rounded-lg shadow-sm
                          focus:outline-none focus:ring-2 focus:ring-upwork-green focus:border-transparent
                          sm:text-sm transition duration-150" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Apellido</label>
            <input type="text" formControlName="apellido"
                   class="appearance-none block w-full px-3 py-2.5
                          bg-white dark:bg-gray-700
                          border border-gray-300 dark:border-gray-600
                          text-gray-900 dark:text-white
                          placeholder-gray-400 dark:placeholder-gray-500
                          rounded-lg shadow-sm
                          focus:outline-none focus:ring-2 focus:ring-upwork-green focus:border-transparent
                          sm:text-sm transition duration-150" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Correo</label>
          <input type="email" formControlName="email"
                 class="appearance-none block w-full px-3 py-2.5
                        bg-white dark:bg-gray-700
                        border border-gray-300 dark:border-gray-600
                        text-gray-900 dark:text-white
                        placeholder-gray-400 dark:placeholder-gray-500
                        rounded-lg shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-upwork-green focus:border-transparent
                        sm:text-sm transition duration-150" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Teléfono <span class="text-gray-400 dark:text-gray-500 font-normal text-xs">(opcional)</span>
          </label>
          <input type="tel" formControlName="telefono"
                 class="appearance-none block w-full px-3 py-2.5
                        bg-white dark:bg-gray-700
                        border border-gray-300 dark:border-gray-600
                        text-gray-900 dark:text-white
                        placeholder-gray-400 dark:placeholder-gray-500
                        rounded-lg shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-upwork-green focus:border-transparent
                        sm:text-sm transition duration-150" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Contraseña <span class="text-gray-400 dark:text-gray-500 font-normal text-xs">(mín. 8 caracteres)</span>
          </label>
          <input type="password" formControlName="password"
                 class="appearance-none block w-full px-3 py-2.5
                        bg-white dark:bg-gray-700
                        border border-gray-300 dark:border-gray-600
                        text-gray-900 dark:text-white
                        placeholder-gray-400 dark:placeholder-gray-500
                        rounded-lg shadow-sm
                        focus:outline-none focus:ring-2 focus:ring-upwork-green focus:border-transparent
                        sm:text-sm transition duration-150" />
        </div>

        <fieldset class="border border-gray-200 dark:border-gray-600 rounded-xl p-4 bg-gray-50/50 dark:bg-gray-700/30">
          <legend class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider px-2
                         bg-white dark:bg-gray-800 rounded-md border border-gray-200 dark:border-gray-600">
            ¿Cómo usarás EZWorks?
          </legend>

          <div class="mt-3 space-y-3">
            <label class="flex items-start p-3 bg-white dark:bg-gray-700
                          border border-gray-200 dark:border-gray-600
                          rounded-lg hover:border-upwork-green dark:hover:border-upwork-green
                          cursor-pointer transition shadow-2xs">
              <input type="checkbox" formControlName="rolEmpleador"
                     class="h-4 w-4 mt-0.5 text-upwork-green focus:ring-upwork-green
                            border-gray-300 dark:border-gray-500 rounded transition
                            bg-white dark:bg-gray-600" />
              <span class="ml-3 text-sm text-gray-700 dark:text-gray-300">
                <strong class="text-upwork-dark dark:text-white block font-bold">Empleador</strong>
                Quiero publicar proyectos y contratar profesionales.
              </span>
            </label>

            <label class="flex items-start p-3 bg-white dark:bg-gray-700
                          border border-gray-200 dark:border-gray-600
                          rounded-lg hover:border-upwork-green dark:hover:border-upwork-green
                          cursor-pointer transition shadow-2xs">
              <input type="checkbox" formControlName="rolAyudante"
                     class="h-4 w-4 mt-0.5 text-upwork-green focus:ring-upwork-green
                            border-gray-300 dark:border-gray-500 rounded transition
                            bg-white dark:bg-gray-600" />
              <span class="ml-3 text-sm text-gray-700 dark:text-gray-300">
                <strong class="text-upwork-dark dark:text-white block font-bold">Ayudante</strong>
                Quiero buscar trabajos y ofrecer mis habilidades.
              </span>
            </label>
          </div>
        </fieldset>

        <div class="flex items-center">
          <input id="terms" type="checkbox" formControlName="aceptaTerminos"
                 class="h-4 w-4 text-upwork-green focus:ring-upwork-green
                        border-gray-300 dark:border-gray-500 rounded transition
                        bg-white dark:bg-gray-600 cursor-pointer" />
          <label for="terms" class="ml-2 block text-sm text-gray-600 dark:text-gray-400 cursor-pointer select-none">
            Acepto los <a href="#" class="text-upwork-green hover:underline font-medium">términos y condiciones</a>
          </label>
        </div>

        <div class="pt-2">
          <button type="submit" [disabled]="loading()"
                  class="w-full flex justify-center items-center py-2.5 px-4
                         border border-transparent rounded-full shadow-sm
                         text-sm font-bold text-white
                         bg-upwork-green hover:bg-upwork-green-hover
                         focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-upwork-green
                         dark:focus:ring-offset-gray-800
                         transition duration-150 disabled:opacity-60 disabled:cursor-not-allowed">
            @if (loading()) {
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Registrando…
            } @else {
              Registrarme
            }
          </button>
        </div>

      </form>

      <div class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700">
        <p class="text-center text-sm text-gray-500 dark:text-gray-400">
          ¿Ya tienes cuenta?
          <a routerLink="/login" class="font-medium text-upwork-green hover:text-upwork-green-hover hover:underline transition">
            Inicia sesión
          </a>
        </p>
      </div>

    </div>
  </div>
</div>
